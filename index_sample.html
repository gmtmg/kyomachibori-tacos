<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CRAFT TACO BUILDER | KYOMACHIBORI</title>
    <link rel="stylesheet" href="style_sample.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@800&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="noise-overlay"></div>

    <div class="taco-stage">
        <!-- 皿 -->
        <div class="plate-v2">
            <svg viewBox="0 0 400 60">
                <ellipse cx="200" cy="30" rx="180" ry="25" fill="#111" />
                <ellipse cx="200" cy="25" rx="170" ry="20" fill="#222" stroke="#333" stroke-width="2" />
            </svg>
        </div>
        
        <!-- ステージ1: トルティーヤ -->
        <div class="ingredient-svg tortilla-wrap" id="tortilla">
            <svg viewBox="0 0 200 200">
                <defs>
                    <radialGradient id="tortillaGrad" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#FFD700" />
                        <stop offset="80%" stop-color="#F4C430" />
                        <stop offset="100%" stop-color="#DAA520" />
                    </radialGradient>
                </defs>
                <path d="M100,20 C140,20 180,60 180,100 C180,140 140,180 100,180 C60,180 20,140 20,100 C20,60 60,20 100,20" fill="url(#tortillaGrad)">
                    <animate attributeName="d" dur="5s" repeatCount="indefinite"
                        values="M100,20 C140,20 180,60 180,100 C180,140 140,180 100,180 C60,180 20,140 20,100 C20,60 60,20 100,20;
                                M100,25 C145,15 175,65 175,100 C175,135 145,175 100,175 C55,175 25,135 25,100 C25,65 55,25 100,25;
                                M100,20 C140,20 180,60 180,100 C180,140 140,180 100,180 C60,180 20,140 20,100 C20,60 60,20 100,20" />
                </path>
                <!-- 焼き目 -->
                <circle cx="70" cy="60" r="5" fill="#8B4513" opacity="0.3" />
                <circle cx="130" cy="140" r="8" fill="#8B4513" opacity="0.2" />
                <circle cx="150" cy="80" r="4" fill="#8B4513" opacity="0.4" />
            </svg>
        </div>
        
        <!-- ステージ2: キャベツの千切り -->
        <div class="cabbage-group-svg" id="cabbage-group">
            <div class="ingredient-svg cabbage-leaf c1">
                <svg viewBox="0 0 100 20"><path d="M0,10 Q50,0 100,10" stroke="#90EE90" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
            </div>
            <div class="ingredient-svg cabbage-leaf c2">
                <svg viewBox="0 0 100 20"><path d="M0,5 Q50,15 100,5" stroke="#32CD32" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
            </div>
            <div class="ingredient-svg cabbage-leaf c3">
                <svg viewBox="0 0 100 20"><path d="M0,15 Q50,5 100,15" stroke="#ADFF2F" stroke-width="4" fill="none" stroke-linecap="round"/></svg>
            </div>
            <div class="ingredient-svg cabbage-leaf c4">
                <svg viewBox="0 0 100 20"><path d="M10,0 Q60,20 100,0" stroke="#228B22" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
            </div>
        </div>

        <!-- ステージ3: 肉とサルサ -->
        <div class="meat-salsa-group-svg" id="meat-group">
            <!-- ひき肉（塊） -->
            <div class="ingredient-svg meat-chunk m1">
                <svg viewBox="0 0 60 40">
                    <path d="M10,20 Q15,5 30,10 T50,20 T30,35 T10,20" fill="#4B2E1D" />
                    <circle cx="20" cy="15" r="3" fill="#2A1810" />
                    <circle cx="40" cy="25" r="4" fill="#2A1810" />
                </svg>
            </div>
            <div class="ingredient-svg meat-chunk m2">
                <svg viewBox="0 0 60 40">
                    <path d="M5,15 Q20,0 40,10 T55,25 T30,40 T5,15" fill="#5D3A26" />
                </svg>
            </div>
            <!-- サルサソース -->
            <div class="ingredient-svg salsa-drop s1">
                <svg viewBox="0 0 40 40">
                    <path d="M20,5 Q35,5 35,20 T20,35 T5,20 T20,5" fill="#CE1126" />
                    <circle cx="15" cy="15" r="2" fill="#FF6347" />
                </svg>
            </div>
            <div class="ingredient-svg salsa-drop s2">
                <svg viewBox="0 0 30 30">
                    <path d="M15,2 Q28,15 15,28 T2,15 T15,2" fill="#B22222" />
                </svg>
            </div>
        </div>

        <div class="complete-message" id="finish-text">
            <h2>THE MASTERPIECE</h2>
            <p>京町堀 202 | 究極のクラフトタコス</p>
        </div>
    </div>

    <!-- Scroll Triggers -->
    <section class="trigger-section" id="step-0"><div class="scroll-prompt">SCROLL TO BUILD</div></section>
    <section class="trigger-section" id="step-1"><div class="label">01. CORN TORTILLA</div></section>
    <section class="trigger-section" id="step-2"><div class="label">02. SHREDDED GREENS</div></section>
    <section class="trigger-section" id="step-3"><div class="label">03. CARNITAS & SALSA</div></section>
    <section class="trigger-section" id="step-4"><div class="label">FINISH. ART ON PLATE</div></section>

    <div class="back-home"><a href="index.html">BACK TO SITE</a></div>

    <script src="script_sample.js"></script>
</body>
</html>
