<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CRAFT TACO BUILDER | KYOMACHIBORI</title>
    <link rel="stylesheet" href="style_sample.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@800&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="noise-overlay"></div>

    <div class="taco-stage">
        <!-- 高級感のあるセラミックプレート -->
        <div class="plate-v3">
            <svg viewBox="0 0 500 100">
                <defs>
                    <radialGradient id="plateShadow" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="rgba(0,0,0,0.6)" />
                        <stop offset="100%" stop-color="rgba(0,0,0,0)" />
                    </radialGradient>
                </defs>
                <ellipse cx="250" cy="70" rx="220" ry="30" fill="url(#plateShadow)" />
                <ellipse cx="250" cy="50" rx="200" ry="35" fill="#1A1A1A" stroke="#333" stroke-width="1" />
                <ellipse cx="250" cy="45" rx="185" ry="30" fill="#222" stroke="#444" stroke-width="0.5" />
            </svg>
        </div>
        
        <!-- 素材1: ハンドクラフト・トルティーヤ -->
        <div class="ingredient-svg tortilla-v3" id="tortilla">
            <svg viewBox="0 0 300 300">
                <defs>
                    <radialGradient id="cornGrad" cx="45%" cy="45%" r="60%">
                        <stop offset="0%" stop-color="#FFD766" />
                        <stop offset="70%" stop-color="#EBB328" />
                        <stop offset="100%" stop-color="#D49A00" />
                    </radialGradient>
                    <filter id="grain">
                        <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" result="noise" />
                        <feDiffuseLighting in="noise" lighting-color="#D49A00" surfaceScale="1">
                            <feDistantLight azimuth="45" elevation="35" />
                        </feDiffuseLighting>
                    </filter>
                </defs>
                <!-- 生地本体 -->
                <path d="M150,20 C200,22 260,60 275,120 C285,180 230,260 150,275 C70,285 20,220 25,150 C30,80 80,18 150,20" fill="url(#cornGrad)" />
                <!-- 質感のテクスチャ -->
                <path d="M150,20 C200,22 260,60 275,120 C285,180 230,260 150,275 C70,285 20,220 25,150 C30,80 80,18 150,20" fill="#D49A00" opacity="0.1" filter="url(#grain)" />
                <!-- 焦げ目（ディテール） -->
                <circle cx="100" cy="80" r="12" fill="#8B4513" opacity="0.15" />
                <circle cx="180" cy="160" r="8" fill="#5D2E0C" opacity="0.2" />
                <path d="M210,100 Q220,110 215,125" stroke="#8B4513" stroke-width="3" fill="none" opacity="0.1" stroke-linecap="round" />
            </svg>
        </div>
        
        <!-- 素材2: 鮮やかな千切りキャベツ -->
        <div class="cabbage-v3-group" id="cabbage-group">
            <div class="ingredient-svg cab-leaf cl1">
                <svg viewBox="0 0 120 20"><path d="M5,15 C40,5 80,5 115,12" stroke="#E0FFB3" stroke-width="4" fill="none" stroke-linecap="round"/><path d="M5,15 C40,5 80,5 115,12" stroke="#99CC33" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
            </div>
            <div class="ingredient-svg cab-leaf cl2">
                <svg viewBox="0 0 120 20"><path d="M10,5 C50,18 90,8 110,10" stroke="#CCFF99" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
            </div>
            <div class="ingredient-svg cab-leaf cl3">
                <svg viewBox="0 0 120 20"><path d="M5,10 Q60,0 115,15" stroke="#A8E05F" stroke-width="5" fill="none" stroke-linecap="round"/><path d="M5,10 Q60,0 115,15" stroke="#FFF" stroke-width="1" fill="none" opacity="0.3"/></svg>
            </div>
            <div class="ingredient-svg cab-leaf cl4">
                <svg viewBox="0 0 120 20"><path d="M15,18 Q70,5 105,12" stroke="#7CB342" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
            </div>
        </div>

        <!-- 素材3: 熟成カルニータス & リッチサルサ -->
        <div class="protein-v3-group" id="meat-group">
            <!-- 煮込まれた肉の塊 -->
            <div class="ingredient-svg meat-v3 mv1">
                <svg viewBox="0 0 100 80">
                    <path d="M20,40 Q30,10 60,20 T80,45 T50,70 T20,40" fill="#4E2A14" />
                    <path d="M25,35 Q35,20 50,25" stroke="#6D3D21" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
                    <circle cx="45" cy="55" r="3" fill="#2A160A" />
                </svg>
            </div>
            <div class="ingredient-svg meat-v3 mv2">
                <svg viewBox="0 0 100 80">
                    <path d="M15,30 Q40,5 85,25 T70,65 T25,55 T15,30" fill="#5D341B" />
                    <path d="M30,50 Q50,45 70,55" stroke="#2A160A" stroke-width="2" fill="none" opacity="0.4"/>
                </svg>
            </div>
            <!-- サルサソース（光沢あり） -->
            <div class="ingredient-svg salsa-v3 sv1">
                <svg viewBox="0 0 80 80">
                    <path d="M40,10 C60,10 70,30 65,50 C60,70 40,75 20,65 C5,50 15,15 40,10" fill="#CE1126" />
                    <path d="M45,20 C55,20 58,35 55,40" stroke="#FF5252" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
                    <circle cx="35" cy="35" r="2" fill="#FFF" opacity="0.5" />
                </svg>
            </div>
            <div class="ingredient-svg salsa-v3 sv2">
                <svg viewBox="0 0 60 60">
                    <path d="M30,5 Q55,30 30,55 Q5,30 30,5" fill="#A50E1F" />
                </svg>
            </div>
        </div>

        <div class="complete-message" id="finish-text">
            <h2>THE MASTERPIECE</h2>
            <p>SUN YAMATO 202 | KYOMACHIBORI TACOS</p>
        </div>
    </div>

    <!-- Scroll Triggers -->
    <section class="trigger-section" id="step-0"><div class="scroll-prompt-v3">SCROLL TO BUILD</div></section>
    <section class="trigger-section" id="step-1"><div class="label-v3">01. ARTISAN TORTILLA</div></section>
    <section class="trigger-section" id="step-2"><div class="label-v3">02. CRISPY GREENS</div></section>
    <section class="trigger-section" id="step-3"><div class="label-v3">03. RICH CARNITAS</div></section>
    <section class="trigger-section" id="step-4"><div class="label-v3">FINISH.</div></section>

    <div class="back-home"><a href="index.html">BACK TO SITE</a></div>

    <script src="script_sample.js"></script>
</body>
</html>
